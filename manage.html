<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Property Finder - Manage Searches</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .manage-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .manage-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .search-card {
        background: white;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .search-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .search-title {
        font-weight: 600;
        font-size: 1.25rem;
        margin: 0;
      }
      .search-details {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0.5rem 0 0 0;
      }
      .notification-controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--bg-alt);
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
      }
      .delete-btn {
        background: transparent;
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius);
        cursor: pointer;
      }
      .delete-btn:hover {
        background: #fef2f2;
      }
      .load-btn:hover {
        background: #eef2ff !important;
      }
      .select-schedule {
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <div class="manage-container">
        <div class="manage-header">
          <h1>Manage Searches for Property Finder</h1>
          <a href="/">← Back to Search</a>
        </div>
        <div id="savedSearchesContainer">
          <p>Loading saved searches...</p>
        </div>
      </div>
    </main>
    <script src="manage.js"></script>
  </body>
</html>
